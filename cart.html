<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="cart.css">
</head>

<body>

<div class="container">

    <h1>🛒 Shopping Cart</h1>

    <div class="cart-container">

        <div class="cart-item">
            <div>
                <h3>Laptop</h3>
                <p>₹50,000</p>
            </div>

            <input type="number" value="1" class="quantity">

            <button class="remove-btn">
                Remove
            </button>
        </div>

        <div class="cart-summary">
            <h3>Total: ₹50,000</h3>

            <button class="checkout-btn">
                Proceed To Checkout
            </button>
        </div>

    </div>

</div>

</body>
</html>
